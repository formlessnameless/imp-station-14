- type: entity
  id: BrainEnclosure
  parent: BaseBrainEnclosureNT
  components:
  - type: Sprite
    layers:
    - state: xenoborg_stealth
    - state: xenoborg_stealth_e
      map: [ "enum.BorgVisualLayers.Light" ]
      shader: unshaded
      visible: false
    - state: xenoborg_stealth_l
      shader: unshaded
      map: [ "light" ]
      visible: false
  - type: BorgChassis
    maxModules: 0
    hasMindState: xenoborg_stealth_e
    noMindState: xenoborg_stealth_e_r
  - type: BorgTransponder
    sprite:
      sprite: Mobs/Silicon/chassis.rsi
      state: xenoborg_stealth
    name: cyborg
  - type: InteractionPopup
    interactSuccessString: petting-success-generic-cyborg
    interactFailureString: petting-failure-generic-cyborg
